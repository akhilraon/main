name: Sync Address Schemes

on:
  schedule:
    - cron: '30 3 * * 4'
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      source_url:
        description: 'Source URL to download Address_Scheme_details.yaml'
        required: true
        default: 'https://api.github.com/repos/akhilraon/Accession/contents/package.json?ref=master'

permissions:
  contents: write
  pull-requests: write

env:
  TARGET_FILE: rules-repository/src/main/resources/Address_Scheme_details.yaml
  SOURCE_URL: 'https://api.github.com/repos/akhilraon/Accession/contents/package.json?ref=master'
  PR_REVIEWER: 'akhilraon'

jobs:
  sync:
    name: Sync Address_Scheme_details.yaml
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: "accession,main"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Download latest Address_Scheme_details.yaml
        run: |
          URL="${{ github.event.inputs.source_url || env.SOURCE_URL }}"
          curl --fail --silent --show-error --max-time 30 \
            -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
            -H "Accept: application/vnd.github.v3.raw" \
            -o "/tmp/source_file" "$URL"
          echo "Downloaded from: $URL"

      - name: Check for changes
        id: diff
        run: |
          if cmp -s "/tmp/source_file" "${{ env.TARGET_FILE }}"; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected between source and target file."
          else
            cp /tmp/source_file "${{ env.TARGET_FILE }}"
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected, PR will be created."
          fi

      - name: No changes detected
        if: steps.diff.outputs.changed == 'false'
        run: echo "Address_Scheme_details.yaml is already up to date. No PR created."

      - name: Create branch and commit
        if: steps.diff.outputs.changed == 'true'
        run: |
          BRANCH="chore/sync-address-schemes"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH" 2>/dev/null || git checkout "$BRANCH"
          git add "${{ env.TARGET_FILE }}"
          git commit -m "chore: sync Address_Scheme_details.yaml"
          git push origin "$BRANCH" --force
          echo "SYNC_BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        run: |
          # Close ALL existing open PRs for the sync branch
          EXISTING_PRS=$(curl -s \
            -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls?head=${{ github.repository_owner }}:${{ env.SYNC_BRANCH }}&state=open" \
            | jq -r '.[].number')
          for PR in $EXISTING_PRS; do
            echo "Closing existing PR #$PR"
            curl -s -X PATCH \
              -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.repository }}/pulls/$PR \
              -d "{\"state\":\"closed\"}"
          done
          # Create new PR
          PR_RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pulls \
            -d "{\"title\":\"chore: sync Address_Scheme_details.yaml\",\"body\":\"Automated weekly sync of Address_Scheme_details.yaml\",\"head\":\"${{ env.SYNC_BRANCH }}\",\"base\":\"main\",\"draft\":false}")
          PR_NUMBER=$(echo "$PR_RESPONSE" | jq -r '.number')
          echo "PR Number: $PR_NUMBER"
          if [ "$PR_NUMBER" != "null" ]; then
            curl -s -X POST \
              -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER/requested_reviewers \
              -d "{\"reviewers\":[\"${{ env.PR_REVIEWER }}\"]}"
          else
            echo "PR creation failed"
            echo "$PR_RESPONSE"
          fi
